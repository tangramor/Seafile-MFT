version: "3.9"

services:
  seafile-mft:
    build: .
    container_name: seafile-mft
    restart: unless-stopped
    ports:
      - "8080:8080"
    volumes:
      - ./seafile_mft.db:/app/seafile_mft.db
      - ./.env:/app/.env:ro
    environment:
      - TZ=Asia/Shanghai
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:8080/health"]
      interval: 30s
      timeout: 10s
      retries: 3

networks:
  default:
    name: seafile-mft-net
